name: Actualizar Reporte Plan Maestro Movilnet

on:
  schedule:
    # Cada lunes a las 7:00 AM hora Venezuela (UTC-4 = 11:00 UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch: # También permite ejecutarlo manualmente desde GitHub

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar reporte actualizado
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: python generate_report.py

      - name: Commit y push del reporte actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Reporte actualizado automáticamente - $(date +'%Y-%m-%d')"
          git push
